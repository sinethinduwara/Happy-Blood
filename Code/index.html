<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Blood</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Special+Elite&display=swap" rel="stylesheet">
  <style>

    *{ margin:0;
       padding:0;
       box-sizing:border-box 
    }

    :root {
      --red:#8b0000;
      --bg:#050505;
      --text:#d4c4a0;
      --glow:#ff1a1a;
    }

    body {
      background:var(--bg);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      font-family: 'Special Elite', cursive;
      overflow:hidden;
      position:relative;
    }
    body::before {
      content: '';
      position:fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139,0,0,0.15), transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(139,0,0,0.1), transparent 60%);
      animation: pulse_bg 4s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes pulse_bg {
      0%, 100% { opacity: .5 }
      50% { opacity: 1 }
    }
