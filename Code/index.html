<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Blood</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Special+Elite&display=swap" rel="stylesheet">
  <style>

    *{ margin:0;
       padding:0;
       box-sizing:border-box 
    }

    :root {
      --red:#8b0000;
      --bg:#050505;
      --text:#d4c4a0;
      --glow:#ff1a1a;
    }

    body {
      background:var(--bg);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      font-family: 'Special Elite', cursive;
      overflow:hidden;
      position:relative;
    }
    body::before {
      content: '';
      position:fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139,0,0,0.15), transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(139,0,0,0.1), transparent 60%);
      animation: pulse_bg 4s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes pulse_bg {
      0%, 100% { opacity: .5 }
      50% { opacity: 1 }
    }

.fog{
    position:fixed;
    bottom: 0; left: 0;
    width: 200%; height: 200px;
    background: Linear-gradient(transparent, rgba(139,0,0,0.08));
    animation: movefog 8s linear infinite;
    pointer-events:none;

}
@keyframes movefog {
    from{transform: translateX(0) }
    to{transform: translateX(-50) }
}

.drips-wrap{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    pointer-events:none 

}
.drip{
    width:12px;
    height: 0;
    background: var(--red);
    border-radius: 0 0 50% 50%;
    position:absolute;
    animation: dripdown var(--t) ease-in var(--d) infinite;

}
@keyframes dripdown{
    0%{ height:0; opacity:1}
    60%{height:var(--h); opacity:1}
    100%{height:var(--h); opacity:0}
}
 
 #sndbtn{
      position: fixed; top:16px; right:16px; z-index:200;
      background: rgba(139,0,0,.3);
      border: 1px solid var(--red);
      color: var(--text);
      font-size:20px;
      width: 44px; height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center;justify-content:center;
      transition:background .3s;
      backdrop-filter:blur(4px);
    }
    #sndbtn:hover { background: rgba(139,0,0,.6) }


#enterscreen{
  position:fixed; inset: 0;
  background:rgba(0,0,0,.93);
  z-index:300;
  display:flex; flex-direction:column;
  align-items:center;justify-content:center;
  gap:24px;
  animation: fadein 1s ease;
}
#enterscreen h2{
  font-family:'Nosifer', cursive;
  color: var(--red);
  font-size:clamp(22px,5vw,42px);
  text-shadow: 0 0 30px var(--glow);
  letter-spacing:3px;
  text-align: center;
  padding: 0 20px;
  animation: txt_flicker 3s infinite;
}
#enterscreen p{
  color:var(--text);
  font-size: 14px;
  letter-spacing:2px;
  opacity: .6;
}
.bigskull{
  font-size:70px;
  animation: skull_float 3s ease-in-out infinite;
  filter:drop-shadow(0 0 20px var(--red));
}
.enterbtn{
  padding: 18px 60px;
  background: var(--red);
  border:none;
  color: var(--text);
  font-family:'creepster', cursive;
  font-size:26px;
  letter-spacing:5px;
  cursor:pointer;
  border-radius:4px;
  transition: all .3s;
  box-shadow: 0 0 40px rgba(139,0,0,.8);
  text-transform:uppercase;
  animation: btn_pulse 2s ease-in-out infinite;
  
}
@keyframes btn_pulse{
  0%,100%{box-shadow: 0 0 30px rgba(139,0,0,.6)}
  50%{box-shadow:0 0 60px rgba(255,0,0,.9 )}
}
.enterbtn:hover{
  background:#aa0000;
  transform:scale(1.05)
}

#homescreen{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:30px;
  z-index:10px;
  padding:20px;
  text-align:center;
}
#homescreen.visible{
  display:flex;
  animation: fadein .9s ease}

@keyframes fadein{
  from{opacity:0; transform:translateY(20px)}
  to{opacitiy:1;transform:translateY(0)}
}
.homeskull{
  font-size:80px;
  animation:skull_flooat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px var(--red));
}
@keyframes skull_float{
  0%,100%{ transform:translateY(0) ratate(-5deg)}
  50%{ transform: translateY(-15px) rotate(5deg) }
}
h1.title{
  font-family: 'Nosifer', cursive;
  font-size: clamp(28px,6vw,60px);
  color: var(--red);
  text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(255,0,0,.3);
  Letter-spacing:4px;
  animation: txt_flicker 3s infinite;
  line-height: 1.2;

}
@keyframes txt_flicker{
  0%,94%,100%{ opacity:1}
  95%{ opacity:.4}
  96%{ opacity:1}
  97%{ opacity:.15}
  98%{ opacity:1}


}

.sub {color:var(--text); font-size:15px; letter-spacing:3px; text-transform:uppercase; opacity:.7}

.name-wrap {width:min(400px,90vw)}
#namefield{
  width:100%;
  padding: 16px 24px;
  background: rgba(139,0,0,.1);
  border: 2px solid var(--red);
  border-radius: 4px;
  color:var(--text);
  font-family: 'special Elite',cusive;
  font-size:20px;
  text-align:center;
  letter-spacing:2px;
  outline:none;
  transition:all .3s;
  box-shadow:inset 0 0 20px rgba(139,0,0,.2), 0 0 20px rgba(139,0,0,.3);
  
}
#namefield::placeholder{ color:rgba(212,196,160,.3); font-size:15px}
#namefield:focus{
  border-color: var(--glow);
  box-shadow:inset 0 0 20px rgba(139,0,0,.3), 0 0 40px rgba(255,0,0,.5);
}
.gobtn{
  padding:16px 50px;
  background: var(--red);
  border:none;
  color:var(--text);
  font-family:'creepster', cursive;
  font-size:24px;
  letter-spacing:4px;
  cursor:pointer;
  border-radius:4px;
  transition: all .3s;
  box-shadow: 0 0 30px rgba(139,0,0,.6);
  text-transform: uppercase;
  position:relative; overflow:hidden;
}
